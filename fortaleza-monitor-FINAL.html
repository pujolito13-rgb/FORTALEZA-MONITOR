const TD_KEY = "03d54091d5b54213bffae3421eed683e";

// ARS y Crypto: auto-refresh (APIs sin límite)
// Mercados: solo al cargar + pull manual (conserva créditos Twelve Data)
const R_ARS = 30;
const R_CRY = 15;
const PULL  = 65;

// UNA sola llamada batch = 1 crédito por símbolo = 10 créditos total
const TD_BATCH = "SOYB,CORN,WEAT,GLD,SLV,USO,BNO,SPY,QQQ,DIA";

async function fetchMarkets() {
  const url = `https://api.twelvedata.com/quote?symbol=${TD_BATCH}&apikey=${TD_KEY}&dp=4`;
  const ctrl = new AbortController();
  const tid = setTimeout(() => ctrl.abort(), 15000);
  try {
    const r = await fetch(url, {signal: ctrl.signal});
    clearTimeout(tid);
    if (!r.ok) throw new Error("HTTP " + r.status);
    const raw = await r.json();
    if (raw.status === "error") throw new Error(raw.message || "error");
    // Batch devuelve objeto con clave = símbolo
    const data = raw.symbol ? {[raw.symbol]: raw} : raw;
    const parse = sym => {
      const d = data[sym];
      if (!d || d.status === "error") return {p:null,c:null,closed:false};
      // close = precio actual (mercado abierto)
      // previous_close = último cierre (mercado cerrado)
      let p = parseFloat(d.close);
      const closed = !p || p <= 0;
      if (closed) p = parseFloat(d.previous_close);
      if (!p || p <= 0) return {p:null,c:null,closed:false};
      const c = parseFloat((d.percent_change||"0").toString().replace(/[+%]/g,""));
      return {p, c: isNaN(c)?0:c, closed};
    };
    const sp  = parse("SPY");  if(sp.p)  sp.p  *= 10;
    const ndx = parse("QQQ");  if(ndx.p) ndx.p *= 35;
    const dji = parse("DIA");  if(dji.p) dji.p *= 100;
    const gld = parse("GLD");  if(gld.p) gld.p *= 10;
    return {
      soja:parse("SOYB"), maiz:parse("CORN"), trigo:parse("WEAT"),
      gold:gld, silver:parse("SLV"),
      wti:parse("USO"), brent:parse("BNO"),
      sp500:sp, nasdaq:ndx, dow:dji,
    };
  } catch(e) { clearTimeout(tid); throw e; }
}

async function fetchCrypto() {
  const s = encodeURIComponent(JSON.stringify(["BTCUSDT","ETHUSDT","SOLUSDT"]));
  const r = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbols=${s}`);
  if (!r.ok) throw new Error(r.status);
  const list = await r.json();
  const m={};
  for(const d of list) m[d.symbol]={p:parseFloat(d.lastPrice),c:parseFloat(d.priceChangePercent)};
  if(!m.BTCUSDT?.p) throw new Error("vacío");
  return {btc:m.BTCUSDT, eth:m.ETHUSDT, sol:m.SOLUSDT};
}

async function fetchArs() {
  const r = await fetch("https://dolarapi.com/v1/dolares");
  if (!r.ok) throw new Error(r.status);
  const list = await r.json();
  const f=c=>list.find(d=>d.casa===c);
  const o=f("oficial"),b=f("blue"),ccl=f("contadoconliqui"),mep=f("bolsa");
  return {
    oficial_c:o?.compra, oficial_v:o?.venta,
    blue_c:b?.compra,    blue_v:b?.venta,
    ccl_c:ccl?.compra,   ccl_v:ccl?.venta,
    mep_c:mep?.compra,   mep_v:mep?.venta,
  };
}

// Formato
const nd=v=>v==null||isNaN(v)||+v<=0;
const fI=v=>nd(v)?"—":+v>=1000?(+v).toLocaleString("es-AR",{maximumFractionDigits:0}):(+v).toFixed(2);
const fD=v=>nd(v)?"—":`US$${(+v).toFixed(2)}`;
const fM=(v,u)=>nd(v)?"—":`$${(+v).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})} ${u}`;
const fC=v=>nd(v)?"—":+v>=1000?`$${(+v).toLocaleString("en-US",{maximumFractionDigits:0})}`:`$${(+v).toFixed(2)}`;
const fA=v=>nd(v)?"—":`$${(+v).toLocaleString("es-AR")}`;

function Spark({up}){
  const pts=up?"0,22 10,18 20,19 30,14 40,15 50,10 60,11 70,7 80,5":"0,5 10,9 20,8 30,13 40,12 50,17 60,16 70,20 80,22";
  const c=up?"#4ADE80":"#F87171";
  return <svg width="80" height="26" viewBox="0 0 80 26">
    <polyline points={pts} stroke={c} strokeWidth="1.6" fill="none" strokeLinecap="round" strokeLinejoin="round" opacity="0.85"/>
    <circle cx="80" cy={up?"5":"22"} r="2.5" fill={c}/>
  </svg>;
}
function Skel({isLast}){
  return <div style={{padding:"13px 18px",borderBottom:isLast?"none":"1px solid rgba(200,168,75,0.07)"}}>
    <div style={{height:"10px",width:"90px",borderRadius:"4px",background:"rgba(200,168,75,0.09)",marginBottom:"8px",animation:"shimmer 1.4s ease-in-out infinite"}}/>
    <div style={{height:"18px",width:"140px",borderRadius:"4px",background:"rgba(200,168,75,0.06)",animation:"shimmer 1.4s ease-in-out infinite 0.2s"}}/>
  </div>;
}
function Row({label,val,chg,isLast,tag,closed}){
  const noData=val==="—", up=!noData&&chg!=null&&+chg>=0;
  const col=noData?"#3A5A30":up?"#4ADE80":"#F87171";
  return <div style={{display:"grid",gridTemplateColumns:"1fr 88px 72px",alignItems:"center",
    padding:"12px 18px",borderBottom:isLast?"none":"1px solid rgba(200,168,75,0.07)",
    gap:"8px",transition:"background 0.15s"}}
    onMouseEnter={e=>e.currentTarget.style.background="rgba(200,168,75,0.04)"}
    onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
    <div>
      <div style={{fontSize:"11px",fontWeight:600,letterSpacing:"0.06em",color:"#7A9870",
        textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif",
        display:"flex",alignItems:"center",gap:"5px"}}>
        {label}
        {tag&&<span style={{fontSize:"9px",padding:"1px 5px",borderRadius:"3px",
          background:"rgba(200,168,75,0.15)",color:"#C8A84B"}}>{tag}</span>}
        {closed&&<span style={{fontSize:"9px",padding:"1px 5px",borderRadius:"3px",
          background:"rgba(90,120,70,0.2)",color:"#5A8A48"}}>CIERRE</span>}
      </div>
      <div style={{fontSize:"19px",fontWeight:700,color:noData?"#3A5A30":"#F0E8D0",
        fontFamily:"'Space Mono',monospace",letterSpacing:"-0.02em",marginTop:"1px"}}>{val}</div>
    </div>
    {!noData&&chg!=null?<Spark up={up}/>:<div/>}
    <div style={{textAlign:"right"}}>
      {!noData&&chg!=null&&<span style={{fontFamily:"'Space Mono',monospace",fontSize:"12px",fontWeight:700,color:col}}>
        {up?"▲":"▼"} {Math.abs(+chg).toFixed(2)}%
      </span>}
    </div>
  </div>;
}

    <div style={{textAlign:"right"}}>
      <div style={{fontSize:"9px",color:"#4A6A38",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.08em"}}>VENTA</div>
      <div style={{fontFamily:"'Space Mono',monospace",fontSize:"14px",fontWeight:700,color:"#C8A84B"}}>{fA(venta)}</div>
    </div>
  </div>;
}
function Card({title,icon,status,badge,children}){
  const dc=status==="loading"?"#FBBF24":status==="ok"?"#4ADE80":"#F87171";
  return <div style={{background:"linear-gradient(145deg,rgba(18,28,10,0.95),rgba(10,18,6,0.98))",
    border:"1px solid rgba(200,168,75,0.15)",borderRadius:"14px",overflow:"hidden",
    boxShadow:"0 8px 32px rgba(0,0,0,0.5),inset 0 1px 0 rgba(200,168,75,0.08)"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
      padding:"9px 18px",background:"rgba(200,168,75,0.05)",borderBottom:"1px solid rgba(200,168,75,0.10)"}}>
      <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
        <span style={{fontSize:"13px"}}>{icon}</span>
        <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:"10px",fontWeight:700,
          letterSpacing:"0.2em",color:"#C8A84B",textTransform:"uppercase"}}>{title}</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:"7px"}}>
        {badge&&<span style={{fontSize:"9px",color:"rgba(74,106,56,0.6)",fontFamily:"'Space Mono',monospace"}}>{badge}</span>}
        <div style={{width:"7px",height:"7px",borderRadius:"50%",background:dc,
          boxShadow:`0 0 7px ${dc}`,animation:status==="loading"?"blink 0.9s ease-in-out infinite":"none"}}/>
      </div>
    </div>
    {children}
  </div>;
}
function PullIndicator({pullY,loading}){
  const pct=Math.min(pullY/PULL,1),ready=pullY>=PULL,c=ready?"#4ADE80":"#C8A84B",circ=2*Math.PI*10;
  return <div style={{position:"absolute",top:0,left:"50%",zIndex:30,
    transform:`translateX(-50%) translateY(${Math.max(pullY-18,0)}px)`,
    opacity:pullY>8?1:0,transition:pullY===0?"transform 0.3s ease,opacity 0.25s":"none"}}>
    <div style={{width:36,height:36,borderRadius:"50%",background:"rgba(14,22,8,0.97)",
      border:`1px solid ${c}55`,display:"flex",alignItems:"center",justifyContent:"center",
      boxShadow:"0 4px 20px rgba(0,0,0,0.7)"}}>
      {loading
        ?<svg width="18" height="18" viewBox="0 0 18 18" style={{animation:"spin 0.7s linear infinite"}}>
            <circle cx="9" cy="9" r="6.5" stroke="rgba(200,168,75,0.2)" strokeWidth="2" fill="none"/>
            <path d="M9 2.5 A6.5 6.5 0 0 1 15.5 9" stroke="#C8A84B" strokeWidth="2" fill="none" strokeLinecap="round"/>
          </svg>
        :<svg width="18" height="18" viewBox="0 0 18 18">
            <circle cx="9" cy="9" r="10" stroke="rgba(200,168,75,0.12)" strokeWidth="1.5" fill="none"/>
            <circle cx="9" cy="9" r="10" stroke={c} strokeWidth="1.5" fill="none"
              strokeDasharray={`${pct*circ} ${circ}`} strokeLinecap="round" transform="rotate(-90 9 9)"
              style={{transition:"stroke 0.2s"}}/>
            <text x="9" y="12.5" textAnchor="middle" fontSize="9" fill={c} fontWeight="bold">{ready?"↑":"↓"}</text>
          </svg>}
    </div>
  </div>;
}

function App(){
  const [mkt,setMkt]=useState(null);
  const [ars,setArs]=useState(null);
  const [cry,setCry]=useState(null);
  const [mktSt,setMktSt]=useState("loading");
  const [arsSt,setArsSt]=useState("loading");
  const [crySt,setCrySt]=useState("loading");
  const [cdA,setCdA]=useState(R_ARS);
  const [cdC,setCdC]=useState(R_CRY);
  const [mktTs,setMktTs]=useState(null); // timestamp última actualización mercados
  const [now,setNow]=useState(new Date());
  const [pullY,setPullY]=useState(0);
  const [pulling,setPulling]=useState(false);
  const mktBusy=useRef(false);
  const startY=useRef(0),scrollEl=useRef(null);

  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(t);},[]);
  useEffect(()=>{const t=setInterval(()=>setCdA(c=>c<=1?R_ARS:c-1),1000);return()=>clearInterval(t);},[]);
  useEffect(()=>{const t=setInterval(()=>setCdC(c=>c<=1?R_CRY:c-1),1000);return()=>clearInterval(t);},[]);

  const doMkt=useCallback(async()=>{
    if(mktBusy.current) return;
    mktBusy.current=true;
    setMktSt("loading");
    try{
      const d=await fetchMarkets();
      setMkt(d);
      setMktSt("ok");
      setMktTs(new Date());
    }catch{
      setMktSt("error");
    }finally{
      mktBusy.current=false;
    }
  },[]);

  const doArs=useCallback(async()=>{
    setArsSt("loading");
    try{setArs(await fetchArs());setArsSt("ok");}
    catch{setArsSt("error");}
    setCdA(R_ARS);
  },[]);

  const doCry=useCallback(async()=>{
    setCrySt("loading");
    try{setCry(await fetchCrypto());setCrySt("ok");}
    catch{setCrySt("error");}
    setCdC(R_CRY);
  },[]);

  // Mercados: solo al cargar (no auto-refresh para conservar créditos)
  // ARS y Crypto: auto-refresh cada 30s y 15s
  useEffect(()=>{
    doMkt();
    doArs();
    doCry();
    const ta=setInterval(doArs,R_ARS*1000);
    const tc=setInterval(doCry,R_CRY*1000);
    return()=>{clearInterval(ta);clearInterval(tc);};
  },[]);

  const isLoading=mktSt==="loading"||arsSt==="loading"||crySt==="loading";

  const onTS=useCallback(e=>{
    if((scrollEl.current?.scrollTop||0)===0&&!isLoading){
      startY.current=e.touches[0].clientY;setPulling(true);
    }
  },[isLoading]);
  const onTM=useCallback(e=>{
    if(!pulling)return;
    const dy=e.touches[0].clientY-startY.current;
    if(dy>0)setPullY(Math.min(dy*0.45,PULL+22));
  },[pulling]);
  const onTE=useCallback(()=>{
    if(pullY>=PULL){doMkt();doArs();doCry();}
    setPullY(0);setPulling(false);
  },[pullY,doMkt,doArs,doCry]);

  const timeStr=now.toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  const dateStr=now.toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long"});
  const mktAge=mktTs?Math.floor((now-mktTs)/60000):null;
  const mktBadge=mktSt==="ok"&&mktAge!==null?(mktAge===0?"ahora":`hace ${mktAge}m`):null;
  const gv=k=>mkt?.[k]??{p:null,c:null,closed:false};

  return <>
    <div ref={scrollEl} onTouchStart={onTS} onTouchMove={onTM} onTouchEnd={onTE}
      style={{minHeight:"100vh",background:"#050C03",position:"relative",overflowY:"auto",
        backgroundImage:"radial-gradient(ellipse 90% 50% at 50% -5%,rgba(200,168,75,0.07) 0%,transparent 65%)",
        fontFamily:"'Barlow Condensed',sans-serif",
        transform:`translateY(${pulling?Math.min(pullY,PULL):0}px)`,
        transition:pulling?"none":"transform 0.3s ease"}}>
      <PullIndicator pullY={pullY} loading={isLoading}/>

      {/* HEADER */}
      <div style={{background:"rgba(5,12,3,0.97)",borderBottom:"1px solid rgba(200,168,75,0.18)",
        position:"sticky",top:0,zIndex:10,backdropFilter:"blur(16px)"}}>
        <div className="hdr-inner" style={{padding:"14px 18px 12px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
              <img src={`data:image/png;base64,${LOGO}`} alt="Fortaleza"
                style={{width:"48px",height:"48px",objectFit:"contain",
                  filter:"drop-shadow(0 2px 12px rgba(200,168,75,0.45))"}}/>
              <div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:"17px",fontWeight:700,
                  color:"#C8A84B",lineHeight:1}}>FORTALEZA</div>
                <div style={{fontSize:"9px",fontWeight:700,letterSpacing:"0.22em",color:"#5A8A48",
                  textTransform:"uppercase",marginTop:"2px"}}>DE CEREALES · MONITOR GLOBAL</div>
              </div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontFamily:"'Space Mono',monospace",fontSize:"16px",color:"#E8D5A3",fontWeight:700}}>{timeStr}</div>
              <div style={{fontSize:"10px",color:"#4A6A38",letterSpacing:"0.05em",marginTop:"2px",
                textTransform:"capitalize"}}>{dateStr}</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
            marginTop:"11px",paddingTop:"10px",borderTop:"1px solid rgba(200,168,75,0.08)"}}>
            <div style={{display:"flex",gap:"12px"}}>
              {[
                {lb:"MERCADOS",st:mktSt},
                {lb:"ARS",st:arsSt,cd:`${cdA}s`},
                {lb:"CRIPTO",st:crySt,cd:`${cdC}s`},
              ].map(({lb,st,cd})=>{
                const col=st==="loading"?"#FBBF24":st==="ok"?"#4ADE80":"#F87171";
                return <div key={lb} style={{display:"flex",alignItems:"center",gap:"4px"}}>
                  <div style={{width:"6px",height:"6px",borderRadius:"50%",background:col,
                    boxShadow:`0 0 6px ${col}`,
                    animation:st==="loading"?"blink 0.9s ease-in-out infinite":"none"}}/>
                  <span style={{fontSize:"9px",fontWeight:700,letterSpacing:"0.08em",color:col}}>
                    {lb}
                    {cd&&st!=="loading"&&<span style={{opacity:0.5,fontFamily:"'Space Mono',monospace",
                      fontSize:"8px"}}> {cd}</span>}
                  </span>
                </div>;
              })}
            </div>
            <span style={{fontSize:"9px",color:"rgba(74,106,56,0.4)"}}>↓ pull actualizar</span>
          </div>
        </div>
      </div>

      {/* CONTENT */}
      <div className="page" style={{maxWidth:"480px",margin:"0 auto",padding:"16px 13px 44px"}}>
        <div className="grid" style={{display:"flex",flexDirection:"column",gap:"13px",animation:"fadeUp 0.4s ease"}}>

          <Card title="Granos" icon="🌾" status={mktSt} badge={mktBadge}>
            {!mkt?[1,2,3].map(i=><Skel key={i} isLast={i===3}/>):<>
              <Row label="Soja"  val={fD(gv("soja").p)}  chg={gv("soja").c}  closed={gv("soja").closed}  tag="SOYB"/>
              <Row label="Maíz"  val={fD(gv("maiz").p)}  chg={gv("maiz").c}  closed={gv("maiz").closed}  tag="CORN"/>
              <Row label="Trigo" val={fD(gv("trigo").p)} chg={gv("trigo").c} closed={gv("trigo").closed} tag="WEAT" isLast/>
            </>}
          </Card>

          <Card title="Metales" icon="🥇" status={mktSt} badge={mktBadge}>
            {!mkt?[1,2].map(i=><Skel key={i} isLast={i===2}/>):<>
              <Row label="Oro"   val={fM(gv("gold").p,"$/oz")}   chg={gv("gold").c}   closed={gv("gold").closed}/>
              <Row label="Plata" val={fM(gv("silver").p,"$/oz")} chg={gv("silver").c} closed={gv("silver").closed} isLast/>
            </>}
          </Card>

          <Card title="Tipos de cambio — Argentina" icon="🇦🇷" status={arsSt} badge={arsSt==="ok"?`${cdA}s`:null}>
            {!ars?[1,2,3,4].map(i=><Skel key={i} isLast={i===4}/>):<>
              <ArsRow label="Oficial"        compra={ars.oficial_c} venta={ars.oficial_v}/>
              <ArsRow label="Blue"            compra={ars.blue_c}    venta={ars.blue_v}/>
              <ArsRow label="Contado c/Liqui" compra={ars.ccl_c}     venta={ars.ccl_v}/>
              <ArsRow label="MEP / Bolsa"     compra={ars.mep_c}     venta={ars.mep_v} isLast/>
            </>}
          </Card>

          <Card title="Criptomonedas — Binance" icon="₿" status={crySt} badge={crySt==="ok"?`${cdC}s`:null}>
            {!cry?[1,2,3].map(i=><Skel key={i} isLast={i===3}/>):<>
              <Row label="Bitcoin"  val={fC(cry.btc.p)} chg={cry.btc.c}/>
              <Row label="Ethereum" val={fC(cry.eth.p)} chg={cry.eth.c}/>
              <Row label="Solana"   val={fC(cry.sol.p)} chg={cry.sol.c} isLast/>
            </>}
          </Card>

          <Card title="Índices bursátiles" icon="📈" status={mktSt} badge={mktBadge}>
            {!mkt?[1,2,3].map(i=><Skel key={i} isLast={i===3}/>):<>
              <Row label="S&P 500"    val={fI(gv("sp500").p)}  chg={gv("sp500").c}  closed={gv("sp500").closed}/>
              <Row label="Nasdaq 100" val={fI(gv("nasdaq").p)} chg={gv("nasdaq").c} closed={gv("nasdaq").closed}/>
              <Row label="Dow Jones"  val={fI(gv("dow").p)}    chg={gv("dow").c}    closed={gv("dow").closed} isLast/>
            </>}
          </Card>

          <Card title="Energía — Crudos" icon="🛢️" status={mktSt} badge={mktBadge}>
            {!mkt?[1,2].map(i=><Skel key={i} isLast={i===2}/>):<>
              <Row label="WTI Crude"   val={fD(gv("wti").p)}   chg={gv("wti").c}   closed={gv("wti").closed}/>
              <Row label="Brent Crude" val={fD(gv("brent").p)} chg={gv("brent").c} closed={gv("brent").closed} isLast/>
            </>}
          </Card>

          <div style={{textAlign:"center",padding:"8px 0 2px"}}>
            <div style={{fontSize:"9px",color:"rgba(74,106,56,0.35)",letterSpacing:"0.16em",
              textTransform:"uppercase"}}>Fortaleza de Cereales S.A. · Monitor Global</div>
            <div style={{fontFamily:"'Space Mono',monospace",fontSize:"8px",
              color:"rgba(74,106,56,0.2)",marginTop:"4px"}}>
              Twelve Data · Binance · DolarApi · Solo informativo
            </div>
          </div>
        </div>
      </div>
    </div>
  </>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
